<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bal AI 🤖</title>

<style>
body{
background:#fff8f3;
font-family:Arial,sans-serif;
text-align:center;
padding:30px;
color:#5c4033;
}

h1{
color:#d88c9a;
}

input{
width:80%;
padding:12px;
border-radius:12px;
border:none;
margin-top:20px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:15px;
background:#f6c6d0;
font-size:18px;
}

#cevap{
margin-top:30px;
font-size:18px;
line-height:1.6;
}
</style>

</head>
<body>

<h1>🤖 Bal AI</h1>

<p>Merhaba! 🍯🤍<br>
Ben Bal AI.<br>
Açelya beni özellikle senin için hazırladı.</p>

<input id="mesaj" placeholder="Bana bir şey yaz...">

<br>

<button onclick="cevapla()">Gönder</button>

<div id="cevap"></div>

<script>

function cevapla(){

let mesaj=document.getElementById("mesaj").value.toLowerCase();

let cevap="🍯 Seni dinliyorum. 🤍";

if(mesaj.includes("seni seviyorum"))
cevap="🥹 Eminim Açelya bunu duysa kocaman gülümserdi. O da seni çok seviyor. 🤍🍯";

else if(mesaj.includes("moral"))
cevap="🤍 Her kötü gün geçer. Kendine biraz zaman ver. Açelya bu uygulamayı seni mutlu etmek için hazırladı.";

else if(mesaj.includes("üzgün"))
cevap="🧸 Sana kocaman sarılmak isterdim. Yalnız değilsin. 🤍";

else if(mesaj.includes("mutlu"))
cevap="🥳 Sen mutluysan Bal da mutlu! Bu gülümseme hep seninle olsun. 🍯";

else if(mesaj.includes("teşekkür"))
cevap="🌸 Ne demek... Burada olmak benim için mutluluk.";

document.getElementById("cevap").innerHTML=cevap;

}

</script>

</body>
</html>
