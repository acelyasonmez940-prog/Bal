<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bugün Nasıl Hissediyorsun? 🤍</title>

<link rel="stylesheet" href="style.css">

<style>
.option{
width:100%;
margin:12px 0;
padding:18px;
font-size:20px;
border:none;
border-radius:18px;
background:#EFC7D2;
color:#8D6E63;
cursor:pointer;
transition:.3s;
}

.option:hover{
background:#E7B8C7;
}

#message{
margin-top:25px;
padding:20px;
border-radius:20px;
background:#FFF8F4;
color:#8D6E63;
line-height:1.9;
display:none;
}
</style>
</head>

<body>

<div class="card">

<h1>🤍 Bugün Nasıl Hissediyorsun?</h1>

<p>
İçinden geleni seç.<br>
Bal seni dinliyor. 🍯
</p>

<button class="option" onclick="showMessage('happy')">
😊 Mutluyum
</button>

<button class="option" onclick="showMessage('sad')">
🥺 Biraz kötüyüm
</button>

<button class="option" onclick="showMessage('tired')">
😴 Çok yorgunum
</button>

<button class="option" onclick="showMessage('hug')">
🤍 Sarılmaya ihtiyacım var
</button>

<div id="message"></div>

<br>

<a href="menu.html">← Menüye Dön</a>

</div>

<script>
function showMessage(type){

const box=document.getElementById("message");
box.style.display="block";
if(type==="happy"){
  box.innerHTML="😊 Bugün yüzünün gülmesine çok sevindim. Umarım bu mutluluk hep seninle kalır. 🤍";
}

if(type==="sad"){
  box.innerHTML="🥺 Geçecek... Ben hep burada olacağım. Biraz dinlen, kendine nazik davran. 🌸";
}

if(type==="tired"){
  box.innerHTML="😴 Bugün biraz dinlen olur mu? Sen elinden gelenin en iyisini yapıyorsun. Kendine de biraz şefkat göstermeyi unutma. 🍯";
}

if(type==="hug"){
  box.innerHTML="🤍 Keşke şu an yanında olup sana kocaman sarılabilseydim sevgilim. Kendini yalnız hissetme, ben hep seninleyim.";
}
}
</script>

</body>
</html>
